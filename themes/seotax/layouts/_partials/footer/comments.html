<div id="giscus-container"></div>
<script
  src="https://giscus.app/client.js"
  data-repo="j00j12i11/j00j12i11.github.io"
  data-repo-id="R_kgDOR7sgag"
  data-category="Announcements"
  data-category-id="DIC_kwDOR7sgas4C6Wu1"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-theme="preferred_color_scheme"
  data-lang="ko"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>

<script>
  // 다크모드 전환 시 giscus 테마 동기화
  const giscusObserver = new MutationObserver(() => {
    const theme = document.documentElement.getAttribute('data-theme');
    const giscusFrame = document.querySelector('iframe.giscus-frame');
    if (giscusFrame) {
      giscusFrame.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme === 'dark' ? 'dark' : 'light' } } },
        'https://giscus.app'
      );
    }
  });
  giscusObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
</script>
